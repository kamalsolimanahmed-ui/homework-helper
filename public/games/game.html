<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kids Learning Game</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- Vite build outputs -->
    <script type="module" src="/games/assets/index-C4ekgErd.js"></script>
    <link rel="stylesheet" href="/games/assets/index-BLD_DMlm.css" />

    <script>
      window.addEventListener("message", (event) => {
        if (!event.data) return;

        const { level, subject, lang } = event.data;

        // guard
        if (!level || !subject) return;

        // hook into your existing game config
        window.GAME_CONFIG = {
          level,
          subject,
          lang: lang || "en",
        };

        // if your game already has an init/start function
        if (window.startGame) {
          window.startGame(window.GAME_CONFIG);
        }
      });
    </script>
  </body>
</html>
